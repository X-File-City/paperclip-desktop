name: Check macOS Notarization Status

on:
  workflow_dispatch:
    inputs:
      x64_submission_id:
        description: Apple notarization submission ID for x64
        required: true
      arm64_submission_id:
        description: Apple notarization submission ID for arm64
        required: true

permissions:
  contents: read

jobs:
  status:
    name: Check Apple notarization status
    runs-on: macos-latest
    environment: release

    steps:
      - name: Prepare Apple notarization credentials
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          umask 077

          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          export API_KEY_PATH

          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          api_key = os.environ["APPLE_API_KEY_P8"]
          if "\\n" in api_key and "\n" not in api_key:
              api_key = api_key.replace("\\n", "\n")
          if "BEGIN PRIVATE KEY" not in api_key:
              api_key = base64.b64decode("".join(api_key.split())).decode("utf-8")
          if not api_key.endswith("\n"):
              api_key += "\n"
          Path(os.environ["API_KEY_PATH"]).write_text(api_key, encoding="utf-8")
          PY

          echo "APPLE_API_KEY=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Query Apple notarization status
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail
          mkdir -p notarization-status

          query_status() {
            local label="$1"
            local submission_id="$2"
            xcrun notarytool info "$submission_id" \
              --key "$APPLE_API_KEY" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --output-format json > "notarization-status/${label}.info.json"
          }

          query_status "x64" "${{ github.event.inputs.x64_submission_id }}"
          query_status "arm64" "${{ github.event.inputs.arm64_submission_id }}"

          python - <<'PY'
          import json
          from pathlib import Path

          lines = ["# Notarization status", ""]
          for label in ("x64", "arm64"):
              payload = json.loads((Path("notarization-status") / f"{label}.info.json").read_text())
              status = payload.get("status") or payload.get("statusSummary") or "unknown"
              submission_id = payload.get("id") or payload.get("submissionId") or "unknown"
              lines.append(f"- {label}: `{status}` (`{submission_id}`)")
          Path("notarization-status/summary.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

          cat notarization-status/summary.md >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: notarization-status
          path: notarization-status
          if-no-files-found: error

      - name: Clean up Apple notarization credentials
        if: always()
        run: rm -f "${APPLE_API_KEY:-}"
