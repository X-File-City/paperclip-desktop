name: Sync Upstream Paperclip

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force sync even if version hasn't changed"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      current_version: ${{ steps.check.outputs.current_version }}
      has_update: ${{ steps.check.outputs.has_update }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Check for upstream update
        id: check
        run: |
          PKG_NAME="@paperclipai/server"
          CURRENT=$(node -p "require('./package.json').devDependencies['$PKG_NAME']" | sed 's/[\^~]//')
          LATEST=$(pnpm view "$PKG_NAME" version 2>/dev/null)

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new_version=$LATEST" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT" != "$LATEST" ] || [ "${{ inputs.force }}" = "true" ]; then
            echo "has_update=true" >> "$GITHUB_OUTPUT"
            echo "Update available: $CURRENT → $LATEST"
          else
            echo "has_update=false" >> "$GITHUB_OUTPUT"
            echo "Already on latest: $CURRENT"
          fi

  sync:
    needs: check-and-sync
    if: needs.check-and-sync.outputs.has_update == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Update upstream dependency
        run: |
          NEW_VERSION="${{ needs.check-and-sync.outputs.new_version }}"
          # Update the devDependency to the exact new version
          pnpm pkg set "devDependencies.@paperclipai/server=$NEW_VERSION"
          pnpm install --no-frozen-lockfile

      - name: Build
        id: build
        run: |
          pnpm run build
          pnpm run prepare-server
          pnpm run build-ui
        continue-on-error: true

      - name: Commit and tag on success
        if: steps.build.outcome == 'success'
        run: |
          NEW_VERSION="${{ needs.check-and-sync.outputs.new_version }}"
          OLD_VERSION="${{ needs.check-and-sync.outputs.current_version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "chore: sync upstream @paperclipai/server $OLD_VERSION → $NEW_VERSION"

          # Bump patch version and tag — this triggers the release workflow
          pnpm version patch --no-git-tag-version
          APP_VERSION=$(node -p "require('./package.json').version")
          git add package.json
          git commit -m "chore: bump app version to v$APP_VERSION"
          git tag "v$APP_VERSION"
          git push origin master --tags

      - name: Open issue on failure
        if: steps.build.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const oldVer = '${{ needs.check-and-sync.outputs.current_version }}';
            const newVer = '${{ needs.check-and-sync.outputs.new_version }}';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Upstream sync failed: @paperclipai/server ${oldVer} → ${newVer}`,
              body: [
                `## Upstream Sync Failure`,
                ``,
                `Automated sync from \`@paperclipai/server@${oldVer}\` → \`${newVer}\` failed during build.`,
                ``,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `### How to fix`,
                `1. \`git checkout -b fix/sync-${newVer}\``,
                `2. Update \`@paperclipai/server\` to \`${newVer}\` in package.json`,
                `3. \`pnpm install && pnpm run build && pnpm run prepare-server && pnpm run build-ui\``,
                `4. Fix breaking changes, push, merge`,
                `5. Re-run this workflow manually`,
              ].join('\n'),
              labels: ['upstream-sync', 'bug'],
            });
